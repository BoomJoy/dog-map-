<title>汪去哪 · 江浙沪小狗出行地图</title>
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #1C1C1C;
    --ink-light: #555;
    --bark: #8B6F47;
    --bark-light: #C4A882;
    --bark-pale: #F0E8DB;
    --grass: #4A7C59;
    --grass-light: #D4E8DA;
    --sky: #4A7FA5;
    --sky-light: #D4E8F5;
    --amber: #C4821A;
    --amber-light: #FAE8C8;
    --rose: #B85C6E;
    --rose-light: #FAD8E0;
    --border: rgba(28,28,28,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--cream);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: var(--ink);
    flex-shrink: 0;
  }
  .logo {
    font-size: 17px;
    color: var(--cream);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-sub { font-size: 12px; color: rgba(250,247,242,0.45); letter-spacing: 1px; }
  .header-right { font-size: 11px; color: rgba(250,247,242,0.35); }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 330px;
    min-width: 330px;
    background: #fff;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .search-bar { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .search-bar input {
    width: 100%;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    font-family: inherit;
    background: var(--cream);
    color: var(--ink);
    outline: none;
  }
  .search-bar input:focus { border-color: var(--bark-light); }

  .filter-row {
    padding: 9px 14px;
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .filter-btn {
    font-size: 11px;
    font-family: inherit;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: white;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--bark-light); color: var(--bark); }
  .filter-btn.active { background: var(--ink); border-color: var(--ink); color: white; }
  .filter-btn.active.park { background: var(--grass); border-color: var(--grass); }
  .filter-btn.active.cafe { background: var(--amber); border-color: var(--amber); }
  .filter-btn.active.hotel { background: var(--sky); border-color: var(--sky); }
  .filter-btn.active.hospital { background: var(--rose); border-color: var(--rose); }
  .filter-btn.active.grooming { background: var(--bark); border-color: var(--bark); }

  .city-tabs {
    display: flex;
    padding: 0 14px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .city-tab {
    font-size: 12px;
    padding: 8px 12px;
    cursor: pointer;
    color: var(--ink-light);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .city-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }

  .place-count { padding: 9px 14px 3px; font-size: 11px; color: var(--ink-light); }
  .place-list { flex: 1; overflow-y: auto; }
  .place-list::-webkit-scrollbar { width: 3px; }
  .place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .place-card {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .place-card:hover { background: var(--cream); }
  .place-card.selected { background: var(--bark-pale); }
  .place-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .place-name { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; }
  .place-cat-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .badge-park { background: var(--grass-light); color: var(--grass); }
  .badge-cafe { background: var(--amber-light); color: var(--amber); }
  .badge-hotel { background: var(--sky-light); color: var(--sky); }
  .badge-hospital { background: var(--rose-light); color: var(--rose); }
  .badge-grooming { background: var(--bark-pale); color: var(--bark); }

  .place-city { font-size: 11px; color: var(--ink-light); margin-top: 3px; }
  .place-desc {
    font-size: 12px; color: var(--ink-light); margin-top: 5px; line-height: 1.6;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .place-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .place-tag { font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--cream); color: var(--ink-light); border: 1px solid var(--border); }

  /* Map */
  #map-container { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* Detail popup */
  .detail-popup {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 300px;
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 30px rgba(0,0,0,0.13);
    padding: 16px;
    display: none;
    z-index: 200;
    animation: slideUp 0.18s ease;
  }
  .detail-popup.show { display: block; }
  @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .detail-name { font-size: 15px; font-weight: 500; color: var(--ink); }
  .detail-close { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--ink-light); line-height: 1; }
  .detail-city { font-size: 11px; color: var(--ink-light); margin-bottom: 8px; }
  .detail-desc { font-size: 12px; color: var(--ink-light); line-height: 1.7; margin-bottom: 10px; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .detail-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--cream); color: var(--ink-light); border: 1px solid var(--border); }

  .legend {
    position: absolute;
    top: 14px;
    right: 14px;
    background: white;
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 10px 13px;
    z-index: 200;
    font-size: 11px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);

  .legend-title { font-weight: 500; margin-bottom: 7px; color: var(--ink); }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--ink-light); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Amap marker override */
  .amap-icon img, .amap-marker-content-wrapper { border: none !important; }
</style>

  { id:23, name:"六脚兽宠物度假酒店", city:"苏州", cat:"hotel",    lng:120.8880, lat:31.4430, desc:"位于重云巷内的宠物度假酒店，专为宠物打造的住宿体验，配套完整的宠物友好设施。", tags:["宠物度假","配套完整","阳澄湖","特色住宿"] },
];

// State
let currentCat = 'all', currentCity = 'all', selectedId = null, searchQ = '';
let amapMarkers = {};
let amapMap = null;

function filteredPlaces() {
  return PLACES.filter(p => {
    if (currentCat !== 'all' && p.cat !== currentCat) return false;
    if (currentCity !== 'all' && p.city !== currentCity) return false;
    if (searchQ && !p.name.includes(searchQ) && !p.desc.includes(searchQ)) return false;
    return true;
  });
}

function makeMarkerHTML(p, selected) {
  return `<div style="
    width:32px;height:32px;border-radius:50%;
    background:${CAT_COLOR[p.cat]};
    border:2.5px solid white;
    box-shadow:0 2px 8px rgba(0,0,0,${selected?'0.4':'0.22'});
    display:flex;align-items:center;justify-content:center;
    font-size:14px;cursor:pointer;
    transform:${selected?'scale(1.25)':'scale(1)'};
    transition:transform 0.15s;
  ">${CAT_EMOJI[p.cat]}</div>`;
}

function initMap() {
  amapMap = new AMap.Map('map', {
    zoom: 8,
    center: [120.85, 31.15],
    mapStyle: 'amap://styles/light'
  });

  PLACES.forEach(p => {
    const marker = new AMap.Marker({
      position: [p.lng, p.lat],
      content: makeMarkerHTML(p, false),
      offset: new AMap.Pixel(-16, -16),
      zIndex: 100
    });
    marker.on('click', () => selectPlace(p.id));
    marker.setMap(amapMap);
    amapMarkers[p.id] = marker;
  });
}

function updateMarkers() {
  const visIds = new Set(filteredPlaces().map(p => p.id));
  PLACES.forEach(p => {
    const m = amapMarkers[p.id];
    if (!m) return;
    const sel = selectedId === p.id;
    const vis = visIds.has(p.id);
    m.setContent(`<div style="
      width:32px;height:32px;border-radius:50%;
      background:${CAT_COLOR[p.cat]};
      border:2.5px solid white;
      box-shadow:0 2px 8px rgba(0,0,0,${sel?'0.4':'0.2'});
      display:flex;align-items:center;justify-content:center;
      font-size:14px;cursor:pointer;
      transform:${sel?'scale(1.3)':'scale(1)'};
      opacity:${vis?1:0.2};
      transition:all 0.15s;
    ">${CAT_EMOJI[p.cat]}</div>`);
  });
}

function selectPlace(id) {
  selectedId = id;
  const p = PLACES.find(x => x.id === id);
  if (!p) return;
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-city').textContent = p.city + ' · ' + CAT_LABEL[p.cat];
  document.getElementById('detail-desc').textContent = p.desc;
  document.getElementById('detail-tags').innerHTML = p.tags.map(t => `<span class="detail-tag">${t}</span>`).join('');
  document.getElementById('detail-popup').classList.add('show');
  if (amapMap) amapMap.panTo([p.lng, p.lat]);
  renderList();
  updateMarkers();
}

function renderList() {
  const list = filteredPlaces();
  document.getElementById('place-count').textContent = `共 ${list.length} 个地点`;
  document.getElementById('place-list').innerHTML = list.map(p => `
    <div class="place-card ${selectedId===p.id?'selected':''}" data-id="${p.id}">
      <div class="place-card-top">
        <div class="place-name">${p.name}</div>
        <span class="place-cat-badge badge-${p.cat}">${CAT_EMOJI[p.cat]} ${CAT_LABEL[p.cat]}</span>
      </div>
      <div class="place-city">${p.city}</div>
      <div class="place-desc">${p.desc}</div>
      <div class="place-tags">${p.tags.map(t=>`<span class="place-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
  document.querySelectorAll('.place-card').forEach(el => {
    el.addEventListener('click', () => selectPlace(+el.dataset.id));
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentCat = btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedId = null;
    document.getElementById('detail-popup').classList.remove('show');
    renderList(); updateMarkers();
  });
});

// City tabs
document.querySelectorAll('.city-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentCity = tab.dataset.city;
    document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    selectedId = null;
    document.getElementById('detail-popup').classList.remove('show');
    if (amapMap) {
      if (currentCity !== 'all') {
        const ps = PLACES.filter(p => p.city === currentCity);
        if (ps.length) {
          const lngs = ps.map(p=>p.lng), lats = ps.map(p=>p.lat);
          amapMap.setBounds(new AMap.Bounds(
            [Math.min(...lngs)-0.15, Math.min(...lats)-0.1],
            [Math.max(...lngs)+0.15, Math.max(...lats)+0.1]
          ), false, [50, 50, 50, 50]);
        }
      } else {
        amapMap.setZoomAndCenter(8, [120.85, 31.15]);
      }
    }
    renderList(); updateMarkers();
  });
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  selectedId = null;
  document.getElementById('detail-popup').classList.remove('show');
  renderList(); updateMarkers();
});

// Close popup
document.getElementById('detail-close').addEventListener('click', () => {
  selectedId = null;
  document.getElementById('detail-popup').classList.remove('show');
  renderList(); updateMarkers();
});

// Init
window.onload = function() {
  if (typeof AMap !== 'undefined') {
    initMap();
  }
};
renderList();
</script>
</body>
</html>
