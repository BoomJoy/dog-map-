<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汪去哪 · 江浙沪小狗出行地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --cream:#FAF7F2; --ink:#1C1C1C; --ink-light:#666;
    --bark:#8B6F47; --bark-pale:#F0E8DB;
    --grass:#4A7C59; --grass-light:#D4E8DA;
    --sky:#4A7FA5; --sky-light:#D4E8F5;
    --amber:#C4821A; --amber-light:#FAE8C8;
    --rose:#B85C6E; --rose-light:#FAD8E0;
    --border:rgba(28,28,28,0.1);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body { font-family:"PingFang SC","Microsoft YaHei",sans-serif; background:var(--cream); color:var(--ink); display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  header { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:52px; background:var(--ink); flex-shrink:0; }
  .logo { font-size:17px; color:var(--cream); letter-spacing:2px; display:flex; align-items:center; gap:10px; }
  .logo-sub { font-size:12px; color:rgba(250,247,242,0.45); letter-spacing:1px; }
  .header-right { font-size:11px; color:rgba(250,247,242,0.35); }
  .main { display:flex; flex:1; overflow:hidden; min-height:0; }

  .sidebar { width:330px; min-width:330px; background:#fff; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .search-bar { padding:12px 14px; border-bottom:1px solid var(--border); }
  .search-bar input { width:100%; padding:8px 14px; border:1px solid var(--border); border-radius:999px; font-size:13px; font-family:inherit; background:var(--cream); color:var(--ink); outline:none; }
  .search-bar input:focus { border-color:#C4A882; }

  .filter-row { padding:9px 14px; display:flex; gap:5px; flex-wrap:wrap; border-bottom:1px solid var(--border); }
  .filter-btn { font-size:11px; font-family:inherit; padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:white; color:var(--ink-light); cursor:pointer; transition:all 0.15s; }
  .filter-btn:hover { border-color:#C4A882; color:var(--bark); }
  .filter-btn.active { background:var(--ink); border-color:var(--ink); color:white; }
  .filter-btn.active.park     { background:var(--grass); border-color:var(--grass); }
  .filter-btn.active.cafe     { background:var(--amber); border-color:var(--amber); }
  .filter-btn.active.hotel    { background:var(--sky);   border-color:var(--sky); }
  .filter-btn.active.hospital { background:var(--rose);  border-color:var(--rose); }
  .filter-btn.active.grooming { background:var(--bark);  border-color:var(--bark); }

  .city-tabs { display:flex; padding:0 14px; border-bottom:1px solid var(--border); overflow-x:auto; }
  .city-tabs::-webkit-scrollbar { height:0; }
  .city-tab { font-size:12px; padding:8px 11px; cursor:pointer; color:var(--ink-light); border-bottom:2px solid transparent; transition:all 0.15s; white-space:nowrap; flex-shrink:0; }
  .city-tab.active { color:var(--ink); border-bottom-color:var(--ink); font-weight:500; }

  .place-count { padding:9px 14px 3px; font-size:11px; color:var(--ink-light); }
  .place-list { flex:1; overflow-y:auto; }
  .place-list::-webkit-scrollbar { width:3px; }
  .place-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .place-card { padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
  .place-card:hover { background:var(--cream); }
  .place-card.selected { background:var(--bark-pale); }
  .place-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .place-name { font-size:13px; font-weight:500; color:var(--ink); line-height:1.4; }
  .place-cat-badge { font-size:10px; padding:2px 7px; border-radius:999px; white-space:nowrap; flex-shrink:0; margin-top:1px; }
  .badge-park     { background:var(--grass-light); color:var(--grass); }
  .badge-cafe     { background:var(--amber-light); color:var(--amber); }
  .badge-hotel    { background:var(--sky-light);   color:var(--sky); }
  .badge-hospital { background:var(--rose-light);  color:var(--rose); }
  .badge-grooming { background:var(--bark-pale);   color:var(--bark); }
  .place-city { font-size:11px; color:var(--ink-light); margin-top:3px; }
  .place-addr { font-size:11px; color:var(--ink-light); margin-top:2px; display:flex; align-items:flex-start; gap:3px; line-height:1.5; }
  .place-desc { font-size:12px; color:var(--ink-light); margin-top:5px; line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .place-tags { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
  .place-tag { font-size:10px; padding:2px 6px; border-radius:3px; background:var(--cream); color:var(--ink-light); border:1px solid var(--border); }

  #map-container { flex:1; position:relative; min-width:0; }
  #map { width:100%; height:100%; }

  .detail-popup { position:absolute; bottom:20px; left:20px; width:310px; background:white; border-radius:12px; border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,0,0,0.13); padding:16px; display:none; z-index:1000; animation:slideUp 0.18s ease; }
  .detail-popup.show { display:block; }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;} }
  .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
  .detail-name { font-size:15px; font-weight:500; color:var(--ink); }
  .detail-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--ink-light); line-height:1; }
  .detail-city-label { font-size:11px; color:var(--ink-light); margin-bottom:4px; }
  .detail-addr { font-size:12px; color:var(--ink-light); margin-bottom:8px; display:flex; align-items:flex-start; gap:4px; line-height:1.5; }
  .detail-desc { font-size:12px; color:var(--ink-light); line-height:1.7; margin-bottom:10px; }
  .detail-tags { display:flex; flex-wrap:wrap; gap:4px; }
  .detail-tag { font-size:11px; padding:2px 8px; border-radius:4px; background:var(--cream); color:var(--ink-light); border:1px solid var(--border); }

  .legend { position:absolute; top:14px; right:14px; background:white; border-radius:10px; border:1px solid var(--border); padding:10px 13px; z-index:1000; font-size:11px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
  .legend-title { font-weight:500; margin-bottom:7px; color:var(--ink); }
  .legend-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; color:var(--ink-light); }
  .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .dog-marker { width:32px; height:32px; border-radius:50%; border:2.5px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; transition:transform 0.15s, opacity 0.15s; }
  .dog-marker.faded { opacity:0.2; }
  .dog-marker.selected { transform:scale(1.35); box-shadow:0 4px 16px rgba(0,0,0,0.35); }
</style>
</head>
<body>
<header>
  <div class="logo">🐾 汪去哪 <span class="logo-sub">江浙沪小狗出行地图</span></div>
  <div class="header-right" id="place-total">加载中…</div>
</header>
<div class="main">
  <aside class="sidebar">
    <div class="search-bar"><input type="text" id="search-input" placeholder="搜索地点名称或地址…"/></div>
    <div class="filter-row">
      <button class="filter-btn active" data-cat="all">全部</button>
      <button class="filter-btn park"     data-cat="park">🌳 公园</button>
      <button class="filter-btn cafe"     data-cat="cafe">☕ 咖啡馆</button>
      <button class="filter-btn hotel"    data-cat="hotel">🏨 酒店</button>
      <button class="filter-btn hospital" data-cat="hospital">🏥 医院</button>
      <button class="filter-btn grooming" data-cat="grooming">✂️ 美容</button>
    </div>
    <div class="city-tabs" id="city-tabs">
      <div class="city-tab active" data-city="all">全部</div>
    </div>
    <div class="place-count" id="place-count"></div>
    <div class="place-list" id="place-list"></div>
  </aside>
  <div id="map-container">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-title">图例</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4A7C59"></div>公园绿地</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C4821A"></div>咖啡馆</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4A7FA5"></div>宠物酒店</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B85C6E"></div>宠物医院</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8B6F47"></div>美容洗护</div>
    </div>
    <div class="detail-popup" id="detail-popup">
      <div class="detail-header">
        <div class="detail-name" id="detail-name"></div>
        <button class="detail-close" id="detail-close">×</button>
      </div>
      <div class="detail-city-label" id="detail-city"></div>
      <div class="detail-addr" id="detail-addr"></div>
      <div class="detail-desc" id="detail-desc"></div>
      <div class="detail-tags" id="detail-tags"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script>
const CAT_COLOR = { park:'#4A7C59', cafe:'#C4821A', hotel:'#4A7FA5', hospital:'#B85C6E', grooming:'#8B6F47' };
const CAT_LABEL = { park:'公园绿地', cafe:'咖啡馆', hotel:'宠物酒店', hospital:'宠物医院', grooming:'美容洗护' };
const CAT_EMOJI = { park:'🌳', cafe:'☕', hotel:'🏨', hospital:'🏥', grooming:'✂️' };

let currentCat='all', currentCity='all', selectedId=null, searchQ='';
let leafletMarkers={};

// 动态生成城市标签
const cities=[...new Set(PLACES.map(p=>p.city))];
const cityTabs=document.getElementById('city-tabs');
cities.forEach(c=>{
  const t=document.createElement('div');
  t.className='city-tab'; t.dataset.city=c; t.textContent=c;
  cityTabs.appendChild(t);
});
document.getElementById('place-total').textContent='收录 '+PLACES.length+' 个地点';

// 地图
const map=L.map('map',{zoomControl:true,attributionControl:false}).setView([31.2,120.8],7);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{subdomains:'1234',maxZoom:18}).addTo(map);

function makeIcon(p,selected,faded){
  return L.divIcon({
    className:'',
    html:'<div class="dog-marker'+(selected?' selected':'')+(faded?' faded':'')+'" style="background:'+CAT_COLOR[p.cat]+'">'+CAT_EMOJI[p.cat]+'</div>',
    iconSize:[32,32],iconAnchor:[16,16]
  });
}
PLACES.forEach(p=>{
  const m=L.marker([p.lat,p.lng],{icon:makeIcon(p,false,false)}).addTo(map);
  m.on('click',()=>selectPlace(p.id));
  leafletMarkers[p.id]=m;
});

function getFiltered(){
  return PLACES.filter(p=>{
    if(currentCat!=='all'&&p.cat!==currentCat) return false;
    if(currentCity!=='all'&&p.city!==currentCity) return false;
    if(searchQ&&!p.name.includes(searchQ)&&!p.addr.includes(searchQ)&&!p.desc.includes(searchQ)) return false;
    return true;
  });
}
function updateMarkers(){
  const vis=new Set(getFiltered().map(p=>p.id));
  PLACES.forEach(p=>{ const m=leafletMarkers[p.id]; if(m) m.setIcon(makeIcon(p,selectedId===p.id,!vis.has(p.id))); });
}
function selectPlace(id){
  selectedId=id;
  const p=PLACES.find(x=>x.id===id); if(!p) return;
  document.getElementById('detail-name').textContent=p.name;
  document.getElementById('detail-city').textContent=p.city+' · '+CAT_LABEL[p.cat];
  document.getElementById('detail-addr').innerHTML='📍 '+p.addr;
  document.getElementById('detail-desc').textContent=p.desc;
  document.getElementById('detail-tags').innerHTML=p.tags.map(t=>'<span class="detail-tag">'+t+'</span>').join('');
  document.getElementById('detail-popup').classList.add('show');
  map.panTo([p.lat,p.lng]);
  renderList(); updateMarkers();
}
function renderList(){
  const list=getFiltered();
  document.getElementById('place-count').textContent='共 '+list.length+' 个地点';
  document.getElementById('place-list').innerHTML=list.map(p=>
    '<div class="place-card'+(selectedId===p.id?' selected':'')+'" data-id="'+p.id+'">'+
    '<div class="place-card-top"><div class="place-name">'+p.name+'</div>'+
    '<span class="place-cat-badge badge-'+p.cat+'">'+CAT_EMOJI[p.cat]+' '+CAT_LABEL[p.cat]+'</span></div>'+
    '<div class="place-city">'+p.city+'</div>'+
    '<div class="place-addr">📍 '+p.addr+'</div>'+
    '<div class="place-desc">'+p.desc+'</div>'+
    '<div class="place-tags">'+p.tags.map(t=>'<span class="place-tag">'+t+'</span>').join('')+'</div>'+
    '</div>'
  ).join('');
  document.querySelectorAll('.place-card').forEach(el=>el.addEventListener('click',()=>selectPlace(+el.dataset.id)));
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentCat=btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedId=null; document.getElementById('detail-popup').classList.remove('show');
    renderList(); updateMarkers();
  });
});
cityTabs.addEventListener('click',e=>{
  const tab=e.target.closest('.city-tab'); if(!tab) return;
  currentCity=tab.dataset.city;
  document.querySelectorAll('.city-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  selectedId=null; document.getElementById('detail-popup').classList.remove('show');
  if(currentCity!=='all'){
    const ps=PLACES.filter(p=>p.city===currentCity);
    if(ps.length){
      const lats=ps.map(p=>p.lat),lngs=ps.map(p=>p.lng);
      map.fitBounds([[Math.min(...lats)-0.05,Math.min(...lngs)-0.05],[Math.max(...lats)+0.05,Math.max(...lngs)+0.05]]);
    }
  } else { map.setView([31.2,120.8],7); }
  renderList(); updateMarkers();
});
document.getElementById('search-input').addEventListener('input',e=>{
  searchQ=e.target.value.trim();
  selectedId=null; document.getElementById('detail-popup').classList.remove('show');
  renderList(); updateMarkers();
});
document.getElementById('detail-close').addEventListener('click',()=>{
  selectedId=null; document.getElementById('detail-popup').classList.remove('show');
  renderList(); updateMarkers();
});

renderList();
</script>
</body>
</html>
