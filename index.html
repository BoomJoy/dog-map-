    tags: ["宠物休息区", "木质风格", "有玩具", "绿植装潢"]
  },
  {
    id: 22, name: "黑犬咖啡", city: "苏州", cat: "cafe",
    lat: 31.3020, lng: 120.5920,
    desc: "美式复古风宠物友好咖啡馆，允许携宠进店，有专属水碗，是苏州狗主人常聚的宝藏小店。",
    tags: ["美式复古", "有水碗", "宠物友好", "气氛佳"]
  },
  {
    id: 23, name: "六脚兽宠物度假酒店", city: "苏州", cat: "hotel",
    lat: 31.4430, lng: 120.8880,
    desc: "位于重云巷内的宠物度假酒店，专为宠物打造的住宿体验，配套完整的宠物友好设施。",
    tags: ["宠物度假", "配套完整", "阳澄湖", "特色住宿"]
  },
];

// State
let currentCat = 'all';
let currentCity = 'all';
let selectedId = null;
let searchQ = '';
let markers = {};

// Filter logic
function filtered() {
  return PLACES.filter(p => {
    if (currentCat !== 'all' && p.cat !== currentCat) return false;
    if (currentCity !== 'all' && p.city !== currentCity) return false;
    if (searchQ && !p.name.includes(searchQ) && !p.desc.includes(searchQ)) return false;
    return true;
  });
}

// Category helpers
const catLabel = { park: '公园绿地', cafe: '咖啡馆', hotel: '宠物酒店', hospital: '宠物医院', grooming: '美容洗护' };
const catEmoji = { park: '🌳', cafe: '☕', hotel: '🏨', hospital: '🏥', grooming: '✂️' };

// Init map
const map = L.map('map', { zoomControl: true }).setView([31.15, 120.85], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Create markers
PLACES.forEach(p => {
  const icon = L.divIcon({
    className: 'custom-marker',
    html: `<div class="marker-dot marker-${p.cat}" id="mdot-${p.id}">${catEmoji[p.cat]}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
  const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
  m.on('click', () => selectPlace(p.id));
  markers[p.id] = m;
});

function updateMarkerVisibility() {
  const vis = new Set(filtered().map(p => p.id));
  PLACES.forEach(p => {
    const dot = document.getElementById('mdot-' + p.id);
    if (!dot) return;
    dot.style.opacity = vis.has(p.id) ? '1' : '0.2';
    dot.style.transform = selectedId === p.id ? 'scale(1.3)' : '';
  });
}

function selectPlace(id) {
  selectedId = id;
  const p = PLACES.find(x => x.id === id);
  if (!p) return;

  // Update detail popup
  document.getElementById('detail-name').textContent = p.name;
  document.getElementById('detail-city').textContent = p.city + ' · ' + catLabel[p.cat];
  document.getElementById('detail-desc').textContent = p.desc;
  document.getElementById('detail-tags').innerHTML = p.tags.map(t => `<span class="detail-tag">${t}</span>`).join('');
  document.getElementById('detail-popup').classList.add('show');

  // Pan map
  map.panTo([p.lat, p.lng], { animate: true });

  renderList();
  updateMarkerVisibility();
}

function renderList() {
  const list = filtered();
  document.getElementById('place-count').textContent = `共 ${list.length} 个地点`;
  document.getElementById('place-list').innerHTML = list.map(p => `
    <div class="place-card ${selectedId === p.id ? 'selected' : ''}" data-id="${p.id}">
      <div class="place-card-top">
        <div class="place-name">${p.name}</div>
        <span class="place-cat-badge badge-${p.cat}">${catEmoji[p.cat]} ${catLabel[p.cat]}</span>
      </div>
      <div class="place-city">${p.city}</div>
      <div class="place-desc">${p.desc}</div>
      <div class="place-tags">${p.tags.map(t => `<span class="place-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
  document.querySelectorAll('.place-card').forEach(el => {
    el.addEventListener('click', () => selectPlace(+el.dataset.id));
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentCat = btn.dataset.cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedId = null;
    document.getElementById('detail-popup').classList.remove('show');
    renderList();
    updateMarkerVisibility();
  });
});

// City tabs
document.querySelectorAll('.city-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentCity = tab.dataset.city;
    document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    selectedId = null;
    document.getElementById('detail-popup').classList.remove('show');
    if (currentCity !== 'all') {
      const cityPlaces = PLACES.filter(p => p.city === currentCity);
      if (cityPlaces.length) {
        const lats = cityPlaces.map(p => p.lat);
        const lngs = cityPlaces.map(p => p.lng);
        map.fitBounds([[Math.min(...lats)-0.1, Math.min(...lngs)-0.1], [Math.max(...lats)+0.1, Math.max(...lngs)+0.1]]);
      }
    } else {
      map.setView([31.15, 120.85], 8);
    }
    renderList();
    updateMarkerVisibility();
  });
});

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  selectedId = null;
  document.getElementById('detail-popup').classList.remove('show');
  renderList();
  updateMarkerVisibility();
});

// Close popup
document.getElementById('detail-close').addEventListener('click', () => {
  selectedId = null;
  document.getElementById('detail-popup').classList.remove('show');
  renderList();
  updateMarkerVisibility();
});

// Initial render
renderList();
updateMarkerVisibility();
</script>
</body>
</html>
